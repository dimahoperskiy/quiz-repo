apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: quiz-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: JWT_SECRET
              value: "super-secret-key"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/auth"
