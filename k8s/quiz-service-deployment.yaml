apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: quiz-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-service
  template:
    metadata:
      labels:
        app: quiz-service
    spec:
      containers:
        - name: quiz-service
          image: quiz-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: JWT_SECRET
              value: "super-secret-key"
            - name: GEO_SERVICE_URL
              value: "http://geo-service:3001/api"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/quiz"
